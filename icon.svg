<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="case" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7e7ea"/>
      <stop offset="1" stop-color="#b9bcc4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="#cfd2d8"/>
  <!-- 本体 -->
  <rect x="56" y="48" width="400" height="416" rx="40" fill="url(#case)" stroke="#9aa0ab" stroke-width="6"/>
  <!-- 画面ベゼル -->
  <rect x="96" y="84" width="320" height="252" rx="16" fill="#6f7681"/>
  <rect x="112" y="100" width="288" height="220" rx="8" fill="#000"/>
  <!-- 砂の山 -->
  <g>
    <polygon points="112,320 180,210 250,320" fill="#3a82e8"/>
    <polygon points="170,320 250,235 330,320" fill="#f2c433"/>
    <polygon points="250,320 320,180 400,320" fill="#3db052"/>
    <polygon points="210,320 270,250 330,320" fill="#e85d3a"/>
  </g>
  <!-- 落下中ブロック（S字 緑） -->
  <g fill="#3db052">
    <rect x="208" y="120" width="28" height="28"/>
    <rect x="236" y="120" width="28" height="28"/>
    <rect x="180" y="148" width="28" height="28"/>
    <rect x="208" y="148" width="28" height="28"/>
  </g>
  <!-- ラベル -->
  <rect x="112" y="348" width="288" height="44" rx="6" fill="#000"/>
  <text x="256" y="380" text-anchor="middle" font-family="Verdana, sans-serif" font-size="30" font-weight="bold" fill="#f2c433" letter-spacing="2">SAND TETRIS</text>
  <!-- 十字キー -->
  <g fill="#7c828d">
    <rect x="104" y="418" width="60" height="20" rx="4"/>
    <rect x="124" y="398" width="20" height="60" rx="4"/>
  </g>
  <!-- ボタン -->
  <circle cx="356" cy="428" r="16" fill="#7c828d"/>
  <circle cx="400" cy="420" r="16" fill="#7c828d"/>
