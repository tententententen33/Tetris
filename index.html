<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0d0f1a" />
<title>砂テトリス - Sand Tetris</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app">

  <!-- 上部バー -->
  <header id="topbar">
    <div class="stat-block">
      <span class="stat-label">SCORE</span>
      <span class="stat-value" id="score">0</span>
    </div>
    <div class="next-block">
      <span class="stat-label">NEXT</span>
      <canvas id="nextCv" width="80" height="80"></canvas>
    </div>
    <button id="pauseBtn" class="icon-btn" aria-label="一時停止">❚❚</button>
  </header>

  <!-- ゲーム画面 -->
  <main id="stage">
    <canvas id="cv"></canvas>
  </main>

  <!-- スマホ用コントローラー -->
  <footer id="controller">
    <div class="pad pad-left">
      <button class="ctrl-btn" data-act="left" aria-label="左">◀</button>
      <button class="ctrl-btn" data-act="down" aria-label="下">▼</button>
      <button class="ctrl-btn" data-act="right" aria-label="右">▶</button>
    </div>
    <div class="pad pad-right">
      <button class="ctrl-btn rotate" data-act="rotate" aria-label="回転">⟳</button>
      <button class="ctrl-btn drop" data-act="hard" aria-label="ハードドロップ">⤓</button>
    </div>
  </footer>

  <!-- ホーム画面 -->
  <section id="homeScreen" class="overlay">
    <div class="overlay-card">
      <div class="logo">
        <span class="logo-sand">砂</span>
        <span class="logo-main">テトリス</span>
      </div>
      <p class="tagline">SAND&nbsp;TETRIS</p>
      <p class="desc">ブロックは着地すると砂になって崩れます。<br>同じ色の砂が左の壁から右の壁までつながると、まとめて消えてスコアになります。</p>
      <button id="startBtn" class="primary-btn">スタート</button>
      <p class="hint">PCは ← → 移動 / ↑ 回転 / ↓ 落下 / Space 一気に落下</p>
    </div>
  </section>

  <!-- 一時停止画面 -->
  <section id="pauseScreen" class="overlay hidden">
    <div class="overlay-card">
      <h1 class="screen-title">一時停止</h1>
      <p class="desc">続けるか、最初からやり直せます。</p>
      <button id="resumeBtn" class="primary-btn">再開</button>
      <button id="restartBtn" class="secondary-btn">やり直す</button>
    </div>
  </section>

  <!-- ゲームオーバー画面 -->
  <section id="gameoverScreen" class="overlay hidden">
    <div class="overlay-card">
      <h1 class="screen-title">ゲームオーバー</h1>
      <p class="desc">スコア <span id="finalScore">0</span></p>
      <button id="retryBtn" class="primary-btn">もう一度</button>
      <button id="homeBtn" class="secondary-btn">ホームへ</button>
    </div>
  </section>

</div>

<script src="game.js"></script>
</body>
</html>
